<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Advanced Typing Game</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        #game-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #666;
        }
        #target-word {
            font-size: 3rem;
            margin: 20px 0;
            letter-spacing: 3px;
            color: #2d3436;
            min-height: 4.5rem;
        }
        input {
            width: 90%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        #difficulty-select {
            margin-bottom: 20px;
            padding: 5px;
        }
        .hidden { display: none; }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="game-box">
    <!-- 設定画面 -->
    <div id="start-screen">
        <h2>タイピングゲーム</h2>
        <p>難易度を選択してください</p>
        <select id="difficulty-select">
            <option value="easy">かんたん (短い単語)</option>
            <option value="normal" selected>ふつう (日常単語)</option>
            <option value="hard">むずかしい (長い単語)</option>
        </select>
        <br>
        <button onclick="startGame()">ゲーム開始！</button>
    </div>

    <!-- プレイ画面 -->
    <div id="play-screen" class="hidden">
        <div class="stats">
            <div>残り時間: <span id="time">30</span>s</div>
            <div>スコア: <span id="score">0</span></div>
        </div>
        <div id="target-word"></div>
        <input type="text" id="type-input" autocomplete="off">
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="hidden">
        <h2>終了！</h2>
        <p>あなたのスコアは <span id="final-score">0</span> 点でした！</p>
        <button onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
    // 1. データ設定
    const wordList = {
        easy: ["cat", "dog", "sun", "book", "fish", "pen", "cup", "sky"],
        normal: ["apple", "banana", "window", "school", "rocket", "orange", "planet"],
        hard: ["javascript", "programming", "environment", "chocolate", "experience", "beautiful"]
    };

    let score = 0;
    let timeLeft = 30;
    let currentWord = "";
    let timerId = null;

    // 要素の取得
    const startScreen = document.getElementById('start-screen');
    const playScreen = document.getElementById('play-screen');
    const resultScreen = document.getElementById('result-screen');
    const typeInput = document.getElementById('type-input');
    const wordDisplay = document.getElementById('target-word');
    const timeDisplay = document.getElementById('time');
    const scoreDisplay = document.getElementById('score');

    // 2. ゲーム開始
    function startGame() {
        const difficulty = document.getElementById('difficulty-select').value;
        startScreen.classList.add('hidden');
        playScreen.classList.remove('hidden');
        
        score = 0;
        timeLeft = 30;
        scoreDisplay.textContent = score;
        timeDisplay.textContent = timeLeft;
        
        setWord(difficulty);
        typeInput.focus();
        
        // カウントダウン開始
        timerId = setInterval(() => {
            timeLeft--;
            timeDisplay.textContent = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    // 3. 単語のセット
    function setWord(diff) {
        const words = wordList[diff];
        currentWord = words[Math.floor(Math.random() * words.length)];
        wordDisplay.textContent = currentWord;
    }

    // 4. タイピング判定
    typeInput.addEventListener('input', () => {
        if (typeInput.value === currentWord) {
            score++;
            scoreDisplay.textContent = score;
            typeInput.value = "";
            const difficulty = document.getElementById('difficulty-select').value;
            setWord(difficulty);
        }
    });

    // 5. ゲーム終了
    function endGame() {
        clearInterval(timerId);
        playScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        document.getElementById('final-score').textContent = score;
    }
</script>

</body>
</html>
